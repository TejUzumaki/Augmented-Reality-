<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fixed Markerless WebAR</title>
    <style>
        /* Force HTML elements to be transparent so video shows through */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }
        
        /* The video element MUST sit perfectly behind the canvas */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
        }

        /* The 3D canvas sits directly on top of the video */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
        }

        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            width: 90%;
            pointer-events: none;
        }
        .instruction-tag {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-container">
        <div class="instruction-tag">👇 Drag to Rotate | Pinch to Zoom</div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let shapes = [];

        init();
        animate();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            // 3. Renderer Setup - Crucial settings for transparency
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            // Force completely clear background color on the 3D layer
            renderer.setClearColor(0x000000, 0); 
            document.body.appendChild(renderer.domElement);

            // 4. Fire up the camera feed
            setupCameraBackground();

            // 5. Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            // 6. Build 3D Shape Group
            const objectGroup = new THREE.Group();
            
            // Neon Cube
            const cubeGeo = new THREE.BoxGeometry(1, 1, 1);
            const cubeMat = new THREE.MeshStandardMaterial({ color: 0xFF5733, roughness: 0.2 });
            const cube = new THREE.Mesh(cubeGeo, cubeMat);
            cube.position.set(-1.2, 0.5, 0);
            objectGroup.add(cube);
            shapes.push(cube);

            // Cylinder
            const cylGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.2, 32);
            const cylMat = new THREE.MeshStandardMaterial({ color: 0x0077CC, metalness: 0.1 });
            const cylinder = new THREE.Mesh(cylGeo, cylMat);
            cylinder.position.set(1.2, 0.6, 0);
            objectGroup.add(cylinder);
            shapes.push(cylinder);

            // Sphere
            const sphereGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ color: 0x2ECC71, roughness: 0.1 });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            sphere.position.set(0, 1.8, -0.5);
            objectGroup.add(sphere);
            shapes.push(sphere);

            scene.add(objectGroup);

            // 7. Touch Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, 0.8, 0);
            controls.maxPolarAngle = Math.PI / 2;

            window.addEventListener('resize', onWindowResize);
        }

        function setupCameraBackground() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                const constraints = {
                    video: { 
                        facingMode: 'environment', // Targets back camera
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                navigator.mediaDevices.getUserMedia(constraints)
                .then(function (stream) {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.setAttribute('playsinline', true); 
                    video.setAttribute('autoplay', true);
                    video.muted = true; // Auto-play requires video to be muted on iOS
                    video.play();

                    // Prepend it so it natively sits behind everything in the DOM structure
                    document.body.insertBefore(video, document.body.firstChild);
                })
                .catch(function (err) {
                    console.error("Camera access failed: ", err);
                    alert("Camera blocked. Please check your browser site settings and allow camera access.");
                });
            } else {
                alert("Webcam streams are not supported on this browser.");
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            shapes.forEach((shape, index) => {
                shape.rotation.y += 0.01 * (index + 1);
            });

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
