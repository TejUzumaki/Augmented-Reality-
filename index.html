<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instant Food AR Viewer</title>
    <style>
        :root {
            --accent: #ff7675;
            --success: #2ecc71;
            --bg: rgba(0, 0, 0, 0.8);
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000;
        }

        #ar-ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            padding-bottom: 40px;
        }

        .instruction-tag {
            background: var(--bg);
            color: white;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            max-width: 85%;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-pulse {
            width: 8px;
            height: 8px;
            background-color: #fdcb6e;
            border-radius: 50%;
            display: inline-block;
        }

        .searching .status-pulse { background-color: #e17055; animation: pulse 1s infinite; }
        .ready .status-pulse { background-color: var(--success); }
        .placed .status-pulse { display: none; }

        #XRButton {
            border: none !important;
            bottom: 40px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            background-color: var(--accent) !important;
            color: white !important;
            padding: 16px 32px !important;
            border-radius: 30px !important;
            font-size: 16px !important;
            font-weight: bold !important;
            box-shadow: 0 6px 20px rgba(255, 118, 117, 0.4) !important;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(225, 112, 85, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(225, 112, 85, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 112, 85, 0); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="ar-ui-layer">
        <div id="status-tag" class="instruction-tag searching">
            <span class="status-pulse"></span>
            <span id="instruction-text">Tap START AR to serve dinner</span>
        </div>
    </div>

    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let container, camera, scene, renderer;
        let reticle, foodModel;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let objectPlaced = false;

        const statusTag = document.getElementById('status-tag');
        const instructionText = document.getElementById('instruction-text');

        init();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Studio-quality food lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambientLight);

            const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
            keyLight.position.set(2, 4, 3);
            scene.add(keyLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            }));

            // Reticle Target Ring
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.1, 0.13, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0xff7675 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // LOAD OPTIMIZED 3D RAMEN DISH MODEL
            const loader = new THREE.GLTFLoader();
            const foodUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/RamenBowl/glTF/RamenBowl.gltf';

            loader.load(foodUrl, (gltf) => {
                foodModel = gltf.scene;
                foodModel.scale.set(0.6, 0.6, 0.6); // Perfect scale for a table setting
                foodModel.visible = false;
                scene.add(foodModel);
            });

            const controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            window.addEventListener('resize', onWindowResize);
            renderer.setAnimationLoop(render);
        }

        function setUIState(state, customText = '') {
            statusTag.className = `instruction-tag ${state}`;
            instructionText.innerHTML = customText || (state === 'searching' ? "Scan table slowly... or tap anywhere to force place!" : "Surface found! Tap to serve ramen 🍜");
        }

        function onSelect() {
            if (!foodModel || objectPlaced) return;

            if (reticle.visible) {
                // Method A: Perfect Alignment on Detected Surface
                foodModel.position.setFromMatrixPosition(reticle.matrix);
                foodModel.quaternion.setFromRotationMatrix(reticle.matrix);
            } else {
                // Method B: BULLETPROOF FALLBACK 
                // If tracking is taking too long, drop it exactly 1.2 meters directly in front of the camera
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                
                foodModel.position.copy(camera.position).add(dir.multiplyScalar(1.2));
                foodModel.position.y -= 0.3; // Sit slightly lower down so it feels like it's on a surface
                foodModel.rotation.set(0, camera.rotation.y, 0); 
            }

            foodModel.visible = true;
            objectPlaced = true;
            reticle.visible = false;
            setUIState('placed', '✅ Ramen Served! Walk around the dish.');
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function render(timestamp, frame) {
            if (frame && !objectPlaced) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                    setUIState('searching');
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);

                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                        setUIState('ready');
                    } else {
                        reticle.visible = false;
                        setUIState('searching');
                    }
                }
            }

            // Soft slow automatic spin so the lighting sparkles off the food textures
            if (objectPlaced && foodModel) {
                foodModel.rotation.y += 0.004;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
