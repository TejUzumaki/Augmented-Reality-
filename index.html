<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Advanced Snap AR Lens</title>
    <style>
        :root {
            --accent: #2ecc71;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-active: rgba(46, 204, 113, 0.4);
            --bg-dark: #11141a;
        }

        body, html {
            margin: 0; padding: 0; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            width: 100%; height: 100%; color: white;
            user-select: none; -webkit-user-select: none;
        }

        /* Preloader Screen */
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-dark); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-card {
            background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 24px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 80%; max-width: 320px; border: 1px solid rgba(255,255,255,0.08);
        }
        .progress-bar-bg {
            width: 100%; background: rgba(255,255,255,0.1); border-radius: 10px; height: 6px; margin: 20px 0; overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; }
        .btn {
            background: var(--accent); color: white; border: none; padding: 14px 32px;
            font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer;
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3);
        }

        /* AR UI Layer */
        #ar-ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10; pointer-events: none; display: none;
        }

        /* Top Notification HUD */
        .hud-status {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75); padding: 12px 24px; border-radius: 30px;
            font-size: 13px; font-weight: 600; text-align: center; white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
        }

        /* Right-Side Snap-Style Vertical Scroll Menu Bar */
        .vertical-menu-tray {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 16px;
            max-height: 65vh; overflow-y: scroll; pointer-events: auto;
            padding: 10px 6px; scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .vertical-menu-tray::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

        .filter-node {
            width: 64px; height: 64px; border-radius: 50%;
            background: var(--glass); border: 2px solid white;
            box-shadow: 0 8px 16px rgba(0,0,0,0.25);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            font-size: 26px; font-weight: bold; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .filter-node.active {
            background: var(--glass-active); border-color: var(--accent);
            transform: scale(1.12); box-shadow: 0 0 15px rgba(46,204,113,0.5);
        }

        /* Native Button Override rules */
        #XRButton {
            border: none !important; bottom: 40px !important; left: 50% !important;
            transform: translateX(-50%) !important; background: var(--accent) !important;
            color: white !important; padding: 16px 36px !important; border-radius: 35px !important;
            font-size: 16px !important; font-weight: bold !important; display: none;
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.4) !important;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loader-screen">
        <div class="loader-card">
            <h3 style="margin:0 0 10px 0;">AR Engine Preloader</h3>
            <p id="loader-status" style="font-size:14px; color:#a4b0be; margin-bottom:20px;">Download asset packs to local memory cache.</p>
            <div class="progress-bar-bg" id="p-bar-container" style="display:none;"><div id="progress-bar"></div></div>
            <div id="percentage-text" style="display:none; font-size:18px; font-weight:700; margin-bottom:15px;">0%</div>
            <button id="start-btn" class="btn" onclick="triggerAssetEngineDownload()">Download Assets</button>
        </div>
    </div>

    <div id="ar-ui-layer">
        <div class="hud-status" id="hud-text">Move camera to find floor or table</div>
        
        <div class="vertical-menu-tray">
            <div class="filter-node active" onclick="switchActiveFilter(0, this)">🥑</div>
            <div class="filter-node" onclick="switchActiveFilter(1, this)">🚗</div>
            <div class="filter-node" onclick="switchActiveFilter(2, this)">🪑</div>
            <div class="filter-node" onclick="switchActiveFilter(3, this)">🍰</div>
        </div>
    </div>

    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let container, camera, scene, renderer;
        let reticle;
        let hitTestSource = null, hitTestSourceRequested = false;

        // Inventory Model Catalog Config mapping
        const modelsCatalog = [
            { name: 'Avocado', url: './Avocado.glb', scale: 4.0, mesh: null },
            { name: 'ToyCar', url: './ToyCar.glb', scale: 0.15, mesh: null },
            { name: 'Chair', url: './Chair.glb', scale: 0.6, mesh: null },
            { name: 'Cake', url: './Cake.glb', scale: 0.4, mesh: null }
        ];

        let activeIndex = 0;
        let activeModelInstance = null;
        let isHolding = false;

        const hudText = document.getElementById('hud-text');

        window.triggerAssetEngineDownload = function() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('p-bar-container').style.display = 'block';
            document.getElementById('percentage-text').style.display = 'block';
            
            initGraphicsPipeline();
        }

        function initGraphicsPipeline() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Studio Lighting Setup
            scene.add(new THREE.AmbientLight(0xffffff, 1.4));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(2, 6, 4);
            scene.add(sun);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // Grid Tracking Reticle
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.06, 0.09, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x2ecc71 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            loadCatalogSequentially(0);
        }

        // Sequential local caching loop
        function loadCatalogSequentially(index) {
            if (index >= modelsCatalog.length) {
                completeEngineValidation();
                return;
            }

            document.getElementById('loader-status').innerHTML = `Caching model pack: ${modelsCatalog[index].name}...`;
            const loader = new THREE.GLTFLoader();
            
            loader.load(modelsCatalog[index].url, (gltf) => {
                const modelScene = gltf.scene;
                const s = modelsCatalog[index].scale;
                modelScene.scale.set(s, s, s);
                modelScene.visible = false;
                scene.add(modelScene);
                
                modelsCatalog[index].mesh = modelScene;
                
                // Track forward loop progress 
                const percentage = Math.round(((index + 1) / modelsCatalog.length) * 100);
                document.getElementById('progress-bar').style.width = percentage + '%';
                document.getElementById('percentage-text').innerHTML = percentage + '%';
                
                loadCatalogSequentially(index + 1);
            }, undefined, (err) => {
                console.error("Critical Asset failed loading step: ", err);
                document.getElementById('loader-status').innerHTML = `Missing asset tracking: ${modelsCatalog[index].name}.glb. Check filename match.`;
            });
        }

        function completeEngineValidation() {
            const xrBtn = ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });
            document.body.appendChild(xrBtn);

            document.getElementById('loader-screen').style.display = 'none';
            document.getElementById('ar-ui-layer').style.display = 'block';
            xrBtn.style.display = 'block';

            setupInteractionListeners();
            renderer.setAnimationLoop(renderLoop);
        }

        // --- Interaction Drag & Drop Tracking Logic ---
        function setupInteractionListeners() {
            // Track when user holds down on screen
            window.addEventListener('touchstart', (e) => { isHolding = true; });
            window.addEventListener('mousedown', (e) => { isHolding = true; });

            // Track when user releases screen
            window.addEventListener('touchend', (e) => { isHolding = false; });
            window.addEventListener('mouseup', (e) => { isHolding = false; });
        }

        // Global function attached to UI nodes
        window.switchActiveFilter = function(targetIdx, element) {
            if (targetIdx === activeIndex) return;

            // Remove active classes from other menu circles
            document.querySelectorAll('.filter-node').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // Instantly hide the old active model instance
            if (activeModelInstance) {
                activeModelInstance.visible = false;
            }

            activeIndex = targetIdx;
            activeModelInstance = modelsCatalog[activeIndex].mesh;
            
            // If the ring tracking is on a surface, instantly snap the new model there
            if (reticle.visible && activeModelInstance) {
                activeModelInstance.position.setFromMatrixPosition(reticle.matrix);
                activeModelInstance.quaternion.setFromRotationMatrix(reticle.matrix);
                activeModelInstance.visible = true;
            }
        }

        function renderLoop(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);

                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);

                        // INITIAL STATE: If no item is deployed yet, load index 0 onto first surface match
                        if (!activeModelInstance) {
                            activeModelInstance = modelsCatalog[activeIndex].mesh;
                        }

                        // HIGH FREQUENCY SNAP COUPLING (Anti-Floating Logic):
                        // If user is holding their finger down OR the item hasn't been locked down yet,
                        // constantly glue the model's position directly onto the surface tracking data.
                        if (isHolding || !activeModelInstance.visible) {
                            activeModelInstance.position.setFromMatrixPosition(reticle.matrix);
                            activeModelInstance.quaternion.setFromRotationMatrix(reticle.matrix);
                            activeModelInstance.visible = true;
                            hudText.innerHTML = `Hold & drag to slide ${modelsCatalog[activeIndex].name}! 🌟`;
                        }
                    } else {
                        reticle.visible = false;
                        if (!activeModelInstance || !activeModelInstance.visible) {
                            hudText.innerHTML = "Point at floor or table surface... 🔍";
                        }
                    }
                }
            }

            // Continuous slow spin on whatever model is currently active
            if (activeModelInstance && activeModelInstance.visible && !isHolding) {
                activeModelInstance.rotation.y += 0.006;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
