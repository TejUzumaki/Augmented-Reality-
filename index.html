<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Plane Detection AR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        /* Style for the native WebXR Enter AR button */
        #ar-button {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            background: #2ECC71;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 999;
        }
        #instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 998;
            pointer-events: none;
            text-align: center;
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <button id="ar-button">START AR</button>
    <div id="instructions">Move phone slowly to detect a flat surface, then tap to place shapes!</div>

    <script type="module">
        // Using ES Modules for WebXR components
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let container, camera, scene, renderer;
        let reticle;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let objectsPlaced = false;
        let objectGroup;

        init();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            // Setup light sources so shapes have realistic depth and shadows
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);

            // Renderer MUST have XR enabled
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // Append official WebXR AR Button config with hit-test (plane detection) features
            const enterButton = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });
            
            // Replace our placeholder button with WebXR custom button
            document.getElementById('ar-button').remove();
            document.body.appendChild(enterButton);

            enterButton.addEventListener('click', () => {
                document.getElementById('instructions').style.display = 'block';
            });

            // Create a Reticle (the target ring that glides along detected floors/tables)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Define the cluster of shapes we want to lock down
            objectGroup = new THREE.Group();
            
            const cube = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshStandardMaterial({ color: 0xFF5733 }));
            cube.position.set(-0.4, 0.15, 0); // raised by half its height to sit perfectly on surface
            objectGroup.add(cube);

            const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.4, 32), new THREE.MeshStandardMaterial({ color: 0x0077CC }));
            cylinder.position.set(0.4, 0.2, 0); 
            objectGroup.add(cylinder);

            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), new THREE.MeshStandardMaterial({ color: 0x2ECC71 }));
            sphere.position.set(0, 0.5, 0); 
            objectGroup.add(sphere);

            // Listen for user screen tap to anchor objects
            const controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            window.addEventListener('resize', onWindowResize);

            // Start rendering cycle using the XR-optimized loop
            renderer.setAnimationLoop(render);
        }

        function onSelect() {
            // If the reticle is visible on a surface and we haven't locked objects down yet
            if (reticle.visible && !objectsPlaced) {
                // Smoothly snap objects directly to the reticle's real-world matrix positioning
                objectGroup.position.setFromMatrixPosition(reticle.matrix);
                objectGroup.quaternion.setFromRotationMatrix(reticle.matrix);
                scene.add(objectGroup);
                
                objectsPlaced = true;
                reticle.visible = false; // Hide targeting ring
                document.getElementById('instructions').innerHTML = "✅ Objects Locked! Walk around them.";
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // The core animation loop checking for surface hits every frame
        function render(timestamp, frame) {
            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                // Request mathematical plane calculation source from WebXR device engine
                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                // If the tracking source is active, compute intersecting geometric surfaces
                if (hitTestSource && !objectsPlaced) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);

                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        // If a floor or table surface is detected, make target ring visible
                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }

            // Idle rotate shapes slightly even when locked onto the floor
            if (objectsPlaced) {
                objectGroup.children.forEach((shape) => {
                    shape.rotation.y += 0.01;
                });
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
