<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Preloaded Local GLB AR</title>
    <style>
        :root {
            --primary: #2ecc71;
            --success: #2ecc71;
            --surface: #1e272e;
        }

        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--surface);
            width: 100%;
            height: 100%;
            color: white;
        }

        #loader-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--surface);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 350px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .progress-container {
            width: 100%;
            background-color: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: var(--primary);
            transition: width 0.1s linear;
        }

        .download-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        #ar-ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            padding-bottom: 50px;
            display: none;
        }

        .instruction-tag {
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #XRButton {
            border: none !important;
            bottom: 50px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            background-color: var(--success) !important;
            color: white !important;
            padding: 16px 32px !important;
            border-radius: 30px !important;
            font-size: 16px !important;
            font-weight: bold !important;
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4) !important;
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loader-screen">
        <div class="loader-card">
            <h2>Food AR Engine</h2>
            <p id="loader-status">Preload the 3D model locally onto your phone.</p>
            
            <div class="progress-container" id="p-bar-container" style="display:none;">
                <div id="progress-bar"></div>
            </div>
            <div id="percentage-text" style="display:none; font-weight:bold; margin-bottom:15px;">0%</div>

            <button id="start-download-btn" class="download-btn" onclick="beginAssetDownload()">Download Model</button>
        </div>
    </div>

    <div id="ar-ui-layer">
        <div id="status-tag" class="instruction-tag">
            <span id="instruction-text">Tap START AR to launch camera</span>
        </div>
    </div>

    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let container, camera, scene, renderer;
        let reticle, arAssetModel;
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let objectPlaced = false;

        const instructionText = document.getElementById('instruction-text');

        window.beginAssetDownload = function() {
            document.getElementById('start-download-btn').style.display = 'none';
            document.getElementById('p-bar-container').style.display = 'block';
            document.getElementById('percentage-text').style.display = 'block';
            document.getElementById('loader-status').innerHTML = "Extracting binary meshes...";
            
            setupGraphicsPipeline();
        }

        function setupGraphicsPipeline() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
            directionalLight.position.set(2, 5, 3);
            scene.add(directionalLight);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.08, 0.12, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x2ecc71 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // TARGET LOCAL COMPRESSED BINARY ASSET
            const loader = new THREE.GLTFLoader();
            const assetLocalUrl = './Avocado.glb';

            loader.load(
                assetLocalUrl, 
                (gltf) => {
                    arAssetModel = gltf.scene;
                    // Scale up because the default model is real-world avocado scale (small)
                    arAssetModel.scale.set(3.5, 3.5, 3.5);
                    arAssetModel.visible = false;
                    scene.add(arAssetModel);

                    const controller = renderer.xr.getController(0);
                    controller.addEventListener('select', tryPlacingObject);
                    scene.add(controller);

                    window.addEventListener('click', tryPlacingObject);
                    window.addEventListener('touchstart', tryPlacingObject);
                    window.addEventListener('resize', onWindowResize);
                    
                    renderer.setAnimationLoop(render);
                    triggerARReadyState();
                },
                (xhr) => {
                    if (xhr.total > 0) {
                        const percentComplete = Math.round((xhr.loaded / xhr.total) * 100);
                        document.getElementById('progress-bar').style.width = percentComplete + '%';
                        document.getElementById('percentage-text').innerHTML = percentComplete + '%';
                    } else {
                        document.getElementById('percentage-text').innerHTML = "Parsing file...";
                    }
                },
                (error) => {
                    console.error("Local file read issue:", error);
                    document.getElementById('loader-status').innerHTML = "Error rendering local file asset.";
                }
            );
        }

        function triggerARReadyState() {
            const webxrBtn = ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });
            document.body.appendChild(webxrBtn);

            document.getElementById('loader-screen').style.display = 'none';
            document.getElementById('ar-ui-layer').style.display = 'flex';
            webxrBtn.style.display = "block";
        }

        function tryPlacingObject() {
            if (!arAssetModel || objectPlaced) return;

            if (reticle.visible) {
                arAssetModel.position.setFromMatrixPosition(reticle.matrix);
                arAssetModel.quaternion.setFromRotationMatrix(reticle.matrix);
            } else {
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                arAssetModel.position.copy(camera.position).add(direction.multiplyScalar(0.8));
                arAssetModel.position.y -= 0.1; 
                arAssetModel.rotation.set(0, camera.rotation.y, 0);
            }

            arAssetModel.visible = true;
            objectPlaced = true;
            reticle.visible = false;
            instructionText.innerHTML = "✅ Object Placed! Move around it.";
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function render(timestamp, frame) {
            if (frame && !objectPlaced) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                    session.addEventListener('end', () => {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);
                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                        instructionText.innerHTML = "Surface found! Tap anywhere to place 🥑";
                    } else {
                        reticle.visible = false;
                        instructionText.innerHTML = "Scanning surface... Or tap screen to force place!";
                    }
                }
            }

            if (objectPlaced && arAssetModel) {
                arAssetModel.rotation.y += 0.005;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
