<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple WebAR App</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* Ensure the canvas takes up the whole screen and hides scrollbars */
        body {
            margin: 0;
            overflow: hidden;
        }
        /* Simple UI Overlay */
        #ui-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: sans-serif;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        Point your camera at a Hiro Marker!
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            
            <a-box position="-0.6 0.5 0" 
                   material="color: #FF5733; opacity: 0.9;" 
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
            </a-box>

            <a-cylinder position="0.6 0.5 0" 
                        radius="0.3" 
                        height="1" 
                        material="color: #0077CC;"
                        animation="property: rotation; to: 360 360 0; loop: true; dur: 6000">
            </a-cylinder>

            <a-sphere position="0 1.2 0" 
                      radius="0.4" 
                      material="color: #2ECC71;"
                      animation="property: position; to: 0 1.5 0; dir: alternate; loop: true; dur: 2000">
            </a-sphere>
            
        </a-marker>

        <a-entity camera></a-entity>
        
    </a-scene>

    <script>
        // Custom JavaScript can go here to interact with the shapes
        const box = document.querySelector('a-box');
        
        // Example: Change cube color when clicked (if using a cursor) or log status
        box.addEventListener('model-loaded', () => {
            console.log("3D Assets loaded successfully!");
        });
    </script>
</body>
</html>
