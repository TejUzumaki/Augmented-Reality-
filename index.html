<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Enterprise AR Spatial Dashboard Pro</title>
    <style>
        :root {
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --panel-bg: rgba(15, 18, 24, 0.85);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-text: #f1f2f6;
            --active-glow: rgba(46, 204, 113, 0.35);
        }

        body, html {
            margin: 0; padding: 0; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #050608;
            width: 100%; height: 100%; color: var(--glass-text);
            user-select: none; -webkit-user-select: none;
        }

        /* --- PRELOADER SCREEN OVERLAY --- */
        #loader-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #141923 0%, #050608 100%);
            z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-card {
            background: rgba(255, 255, 255, 0.02); padding: 40px 30px; border-radius: 28px;
            text-align: center; box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            width: 85%; max-width: 340px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .progress-container {
            width: 100%; background: rgba(255,255,255,0.06); border-radius: 20px; height: 8px; margin: 25px 0; overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); transition: width 0.2s ease-out; }
        .action-btn {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green)); color: white; border: none; padding: 15px 40px;
            font-size: 15px; font-weight: 700; border-radius: 30px; cursor: pointer; letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.25);
        }

        /* --- DASHBOARD UI LAYERS --- */
        #ar-ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 10; pointer-events: none; display: none;
            box-sizing: border-box;
        }

        .dashboard-header {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto;
        }
        .telemetry-capsule {
            background: var(--panel-bg); border: 1px solid var(--glass-border);
            padding: 10px 18px; border-radius: 20px; font-size: 11px; font-weight: 600;
            font-family: monospace; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; gap: 12px;
        }
        .status-pill {
            background: var(--panel-bg); border: 1px solid var(--glass-border);
            padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; gap: 8px;
        }
        .pulse-indicator { width: 8px; height: 8px; background-color: var(--accent-red); border-radius: 50%; transition: background-color 0.3s; }
        .tracking-active .pulse-indicator { background-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }

        /* Snapchat-Style Premium Vertical Menu */
        .right-lens-tray {
            position: absolute; right: 20px; top: 45%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 16px;
            max-height: 55vh; overflow-y: scroll; pointer-events: auto;
            padding: 14px 10px; scrollbar-width: none;
            background: rgba(255, 255, 255, 0.02); border-radius: 40px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .right-lens-tray::-webkit-scrollbar { display: none; }

        .filter-node {
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.05); border: 1.5px solid rgba(255,255,255,0.2);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .filter-node.active {
            background: var(--glass-active); border-color: var(--accent-green);
            transform: scale(1.15); box-shadow: 0 0 25px var(--active-glow);
        }

        /* Bottom Advanced Control Panel */
        .bottom-cockpit-panel {
            position: absolute; bottom: 25px; left: 20px; right: 20px;
            background: var(--panel-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 18px 20px; pointer-events: auto;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column; gap: 12px;
        }
        .panel-row { display: flex; justify-content: space-between; align-items: center; }
        .panel-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #858e96; }
        .panel-value { font-size: 13px; font-weight: 600; color: #fff; }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
        .control-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            color: white; padding: 12px; border-radius: 14px; font-size: 12px; font-weight: 600;
            cursor: pointer; text-align: center; transition: all 0.2s;
        }
        .control-btn:active { background: rgba(255, 255, 255, 0.15); }
        .mapping-btn {
            grid-column: span 2; background: linear-gradient(135deg, rgba(52, 152, 219, 0.2), rgba(46, 204, 113, 0.2));
            border: 1px solid var(--accent-blue); color: #fff; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* WebXR Built-In Enter Button Layout Styling Overrides */
        #XRButton {
            border: none !important; bottom: auto !important; top: 40% !important; left: 50% !important;
            transform: translate(-50%, -50%) !important; background: linear-gradient(135deg, var(--accent-blue), var(--accent-green)) !important;
            color: white !important; padding: 18px 44px !important; border-radius: 35px !important;
            font-size: 16px !important; font-weight: bold !important; display: none; z-index: 2000;
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.3) !important;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loader-screen">
        <div class="loader-card">
            <h2 style="margin:0 0 6px 0; font-size:22px; font-weight:800; background: linear-gradient(90deg, #fff, #a4b0be); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AR Spatial Engine</h2>
            <p id="loader-status" style="font-size:13px; color:#858e96; margin-bottom:0;">Configuring graphic pipelines...</p>
            <div class="progress-container" id="p-bar-container" style="display:none;"><div id="progress-bar"></div></div>
            <div id="percentage-text" style="display:none; font-size:20px; font-weight:800; color:var(--accent-green); margin-bottom:15px;">0%</div>
            <button id="start-btn" class="action-btn" onclick="triggerAssetEngineDownload()">Initialize App</button>
        </div>
    </div>

    <div id="ar-ui-layer">
        <div class="dashboard-header">
            <div class="telemetry-capsule">
                <div>FPS: <span id="telemetry-fps" style="color:var(--accent-green)">60</span></div>
                <div>SURF: <span id="telemetry-mtx" style="color:var(--accent-blue)">SEARCHING</span></div>
            </div>
            <div class="status-pill" id="status-container">
                <span class="pulse-indicator"></span>
                <span id="hud-text">SCANNING AREA</span>
            </div>
        </div>
        
        <div class="right-lens-tray" id="ui-tray"></div>

        <div class="bottom-cockpit-panel">
            <div class="panel-row">
                <div>
                    <div class="panel-label">Active Node Asset</div>
                    <div class="panel-value" id="node-title">None Loaded</div>
                </div>
                <div style="text-align: right;">
                    <div class="panel-label">Surface Alignment</div>
                    <div class="panel-value" id="node-alignment" style="color:var(--accent-red)">Searching Floor</div>
                </div>
            </div>
            <div class="control-grid">
                <button class="control-btn mapping-btn" onclick="toggleAccurateMappingFallback()">Accurate Mapping (3D View)</button>
                <button class="control-btn" onclick="executeManualResetRotation()">Reset Rotation</button>
                <button class="control-btn" onclick="executeProportionalResetScale()">Reset Scale</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let container, camera, scene, renderer;
        let surfaceScannerMat, shadowPlane, fallbackGrid;
        let hitTestSource = null, hitTestSourceRequested = false;

        const modelsCatalog = [
            { name: 'Avocado (Real Scale)', url: './Avocado.glb', scale: 1.0, icon: '🥑', mesh: null },
            { name: 'Racing Car (Real Scale)', url: './ToyCar.glb', scale: 1.0, icon: '🚗', mesh: null },
            { name: 'Hobby Duck (Real Scale)', url: './Duck.glb', scale: 1.0, icon: '🦆', mesh: null }
        ];

        let activeIndex = -1;
        let activeModelInstance = null;
        let isHolding = false;
        let hasBeenPlacedOnce = false;
        let fallbackModeActive = false; // Tracks if accurate mapping fallback grid override is active

        let startTouchDistance = 0, startModelScale = new THREE.Vector3();
        let startTouchAngle = 0, startModelRotationY = 0;
        let lastFrameTime = performance.now(), frameCount = 0;

        const hudText = document.getElementById('hud-text');
        const uiTray = document.getElementById('ui-tray');

        window.triggerAssetEngineDownload = function() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('p-bar-container').style.display = 'block';
            document.getElementById('percentage-text').style.display = 'block';
            initGraphicsPipeline();
        }

        function initGraphicsPipeline() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            camera.position.set(0, 0.4, 0.6); // Set a natural viewing angle for fallback mode

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            const sun = new THREE.DirectionalLight(0xffffff, 1.4);
            sun.position.set(5, 10, 5);
            sun.castShadow = true;
            sun.shadow.mapSize.set(1024, 1024);
            scene.add(sun);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Floor Shadows
            const planeGeo = new THREE.PlaneGeometry(30, 30);
            shadowPlane = new THREE.Mesh(planeGeo, new THREE.ShadowMaterial({ opacity: 0.35 }));
            shadowPlane.rotation.x = -Math.PI / 2;
            shadowPlane.receiveShadow = true;
            shadowPlane.visible = false;
            scene.add(shadowPlane);

            // Interactive Transparent Boundary Scanner Mat
            const scannerGeo = new THREE.PlaneGeometry(0.35, 0.35);
            surfaceScannerMat = new THREE.Mesh(
                scannerGeo,
                new THREE.MeshBasicMaterial({
                    color: 0xe74c3c, 
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.35,
                    depthWrite: false
                })
            );
            surfaceScannerMat.rotation.x = -Math.PI / 2;
            surfaceScannerMat.matrixAutoUpdate = false;
            scene.add(surfaceScannerMat);

            // fallback mode grid setup
            fallbackGrid = new THREE.GridHelper(10, 20, 0x3498db, 0x2c3e50);
            fallbackGrid.position.y = -0.1;
            fallbackGrid.visible = false;
            scene.add(fallbackGrid);

            loadCatalogSequentially(0);
        }

        function loadCatalogSequentially(index) {
            if (index >= modelsCatalog.length) {
                completeEngineValidation();
                return;
            }

            document.getElementById('loader-status').innerHTML = `Caching object: ${modelsCatalog[index].name}...`;
            const loader = new THREE.GLTFLoader();
            
            loader.load(modelsCatalog[index].url, (gltf) => {
                const modelScene = gltf.scene;
                modelScene.traverse((node) => {
                    if (node.isMesh) { node.castShadow = true; node.receiveShadow = true; }
                });

                const s = modelsCatalog[index].scale;
                modelScene.scale.set(s, s, s);
                modelScene.visible = false;
                scene.add(modelScene);
                
                modelsCatalog[index].mesh = modelScene;
                
                const percentage = Math.round(((index + 1) / modelsCatalog.length) * 100);
                document.getElementById('progress-bar').style.width = percentage + '%';
                document.getElementById('percentage-text').innerHTML = percentage + '%';
                
                loadCatalogSequentially(index + 1);
            }, undefined, (err) => {
                loadCatalogSequentially(index + 1);
            });
        }

        function completeEngineValidation() {
            let firstIdx = -1;
            uiTray.innerHTML = ""; 

            modelsCatalog.forEach((item, idx) => {
                if (item.mesh !== null) {
                    if (firstIdx === -1) firstIdx = idx;
                    const node = document.createElement('div');
                    node.className = `filter-node ${idx === firstIdx ? 'active' : ''}`;
                    node.innerHTML = item.icon;
                    node.onclick = (e) => { e.stopPropagation(); switchActiveFilter(idx, node); };
                    uiTray.appendChild(node);
                }
            });

            if (firstIdx === -1) return;

            activeIndex = firstIdx;
            document.getElementById('node-title').innerHTML = modelsCatalog[activeIndex].name;

            const xrBtn = ARButton.createButton(renderer, {
                requiredFeatures: ['hit-test'],
                optionalFeatures: ['dom-overlay'],
                domOverlay: { root: document.body }
            });
            document.body.appendChild(xrBtn);

            document.getElementById('loader-screen').style.display = 'none';
            document.getElementById('ar-ui-layer').style.display = 'block';
            xrBtn.style.display = 'block';

            setupInteractionListeners();
            renderer.setAnimationLoop(renderLoop);
        }

        function setupInteractionListeners() {
            window.addEventListener('touchstart', onTouchStart, { passive: false });
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', () => { isHolding = false; });
            
            window.addEventListener('mousedown', () => { isHolding = true; });
            window.addEventListener('mouseup', () => { isHolding = false; });
            
            window.addEventListener('click', () => {
                if (surfaceScannerMat.visible && !hasBeenPlacedOnce && activeModelInstance) {
                    hasBeenPlacedOnce = true;
                }
            });
        }

        function onTouchStart(e) {
            if (e.touches.length === 1) {
                isHolding = true;
            } else if (e.touches.length === 2 && activeModelInstance && activeModelInstance.visible) {
                isHolding = false; 
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                startTouchDistance = Math.sqrt(dx * dx + dy * dy);
                startModelScale.copy(activeModelInstance.scale);
                startTouchAngle = Math.atan2(dy, dx);
                startModelRotationY = activeModelInstance.rotation.y;
            }
        }

        function onTouchMove(e) {
            if (e.touches.length === 2 && activeModelInstance && activeModelInstance.visible) {
                e.preventDefault();
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                
                const currentDistance = Math.sqrt(dx * dx + dy * dy);
                if (startTouchDistance > 0) {
                    activeModelInstance.scale.copy(startModelScale).multiplyScalar(currentDistance / startTouchDistance);
                }
                const currentAngle = Math.atan2(dy, dx);
                activeModelInstance.rotation.y = startModelRotationY + (currentAngle - startTouchAngle);
            }
        }

        window.switchActiveFilter = function(targetIdx, element) {
            if (targetIdx === activeIndex) return;
            document.querySelectorAll('.filter-node').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            if (activeModelInstance) activeModelInstance.visible = false;

            activeIndex = targetIdx;
            activeModelInstance = modelsCatalog[activeIndex].mesh;
            hasBeenPlacedOnce = false; 
            document.getElementById('node-title').innerHTML = modelsCatalog[activeIndex].name;

            if (fallbackModeActive) {
                activateFallbackModelPlacement();
            }
        }

        // --- ACCURATE MAPPING CONSOLE MODE TOGGLE ---
        window.toggleAccurateMappingFallback = function() {
            fallbackModeActive = !fallbackModeActive;
            const btn = document.querySelector('.mapping-btn');

            if (fallbackModeActive) {
                btn.innerHTML = "Exit Accurate Mapping";
                btn.style.background = "linear-gradient(135deg, rgba(231, 76, 60, 0.2), rgba(231, 76, 60, 0.4))";
                btn.style.borderColor = "var(--accent-red)";
                
                renderer.setClearColor(0x0b0c10, 1); // Kill transparent viewport, enforce dark theme workspace
                fallbackGrid.visible = true;
                surfaceScannerMat.visible = false;
                
                activateFallbackModelPlacement();
            } else {
                btn.innerHTML = "Accurate Mapping (3D View)";
                btn.style.background = "linear-gradient(135deg, rgba(52, 152, 219, 0.2), rgba(46, 204, 113, 0.2))";
                btn.style.borderColor = "var(--accent-blue)";
                
                renderer.setClearColor(0x000000, 0); // Re-open alpha transparent viewport channels for AR pass
                fallbackGrid.visible = false;
                hasBeenPlacedOnce = false;
                if (activeModelInstance) activeModelInstance.visible = false;
            }
        }

        function activateFallbackModelPlacement() {
            if (activeModelInstance) {
                activeModelInstance.position.set(0, -0.1, -0.4); // Centers model neatly on screen grid
                activeModelInstance.visible = true;
                hasBeenPlacedOnce = true;
                shadowPlane.visible = false;
            }
        }

        window.executeManualResetRotation = function() { if (activeModelInstance) activeModelInstance.rotation.set(0, 0, 0); }
        window.executeProportionalResetScale = function() {
            if (activeModelInstance && activeIndex !== -1) {
                const s = modelsCatalog[activeIndex].scale;
                activeModelInstance.scale.set(s, s, s);
            }
        }

        function renderLoop(timestamp, frame) {
            frameCount++;
            const currentTime = performance.now();
            if (currentTime >= lastFrameTime + 1000) {
                document.getElementById('telemetry-fps').innerHTML = Math.round((frameCount * 1000) / (currentTime - lastFrameTime));
                frameCount = 0; lastFrameTime = currentTime;
            }

            // IF ACCURATE MAPPING CONSOLE MODE IS ENGAGED: Force stable fallback rendering loop parameters
            if (fallbackModeActive) {
                document.getElementById('status-container').classList.add('tracking-active');
                document.getElementById('telemetry-mtx').innerHTML = "STUDIO";
                document.getElementById('node-alignment').innerHTML = "STUDIO GRID";
                document.getElementById('node-alignment').style.color = "var(--accent-blue)";
                hudText.innerHTML = "ACCURATE MAPPING ACTIVE";
                
                if (activeModelInstance && activeModelInstance.visible && !isHolding && startTouchDistance === 0) {
                    activeModelInstance.rotation.y += 0.005; // Spin model cleanly in empty virtual room
                }
                renderer.render(scene, camera);
                return; // Stop processing hit tests while in fallback mode
            }

            // STANDALONE NATIVE WEBXR PASS THROUGH LOGIC
            if (!frame || !hitTestSource) {
                surfaceScannerMat.visible = true;
                surfaceScannerMat.material.color.setHex(0xe74c3c); 
                document.getElementById('status-container').classList.remove('tracking-active');
                document.getElementById('telemetry-mtx').innerHTML = "SEARCHING";
                document.getElementById('node-alignment').innerHTML = "Searching Floor";
                document.getElementById('node-alignment').style.color = "var(--accent-red)";
                hudText.innerHTML = "SCAN ENVIRONMENT";
            }

            if (frame) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if (hitTestSourceRequested === false) {
                    session.requestReferenceSpace('viewer').then((viewerSpace) => {
                        session.requestHitTestSource({ space: viewerSpace }).then((source) => { hitTestSource = source; });
                    });
                    hitTestSourceRequested = true;
                }

                if (hitTestSource) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);

                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        document.getElementById('status-container').classList.add('tracking-active');
                        document.getElementById('telemetry-mtx').innerHTML = "LOCKED";
                        surfaceScannerMat.material.color.setHex(0x2ecc71); 
                        
                        if (!hasBeenPlacedOnce || isHolding) {
                            surfaceScannerMat.visible = true;
                        } else {
                            surfaceScannerMat.visible = false;
                        }
                        
                        surfaceScannerMat.matrix.fromArray(pose.transform.matrix);

                        if (activeIndex !== -1 && !activeModelInstance) {
                            activeModelInstance = modelsCatalog[activeIndex].mesh;
                        }

                        if (activeModelInstance && (isHolding || !activeModelInstance.visible)) {
                            activeModelInstance.position.setFromMatrixPosition(surfaceScannerMat.matrix);
                            shadowPlane.position.setFromMatrixPosition(surfaceScannerMat.matrix);
                            
                            activeModelInstance.visible = true;
                            shadowPlane.visible = true;
                            
                            if (isHolding) {
                                hudText.innerHTML = "DRAGGING NODE";
                                document.getElementById('node-alignment').innerHTML = "RE-POSITIONING";
                                document.getElementById('node-alignment').style.color = "var(--accent-blue)";
                            } else {
                                hudText.innerHTML = "TAP TO DEPLOY OBJECT";
                                document.getElementById('node-alignment').innerHTML = "READY TO PLACE";
                                document.getElementById('node-alignment').style.color = "var(--accent-green)";
                            }
                        }
                    } else {
                        surfaceScannerMat.visible = true;
                        surfaceScannerMat.material.color.setHex(0xe74c3c);
                        document.getElementById('status-container').classList.remove('tracking-active');
                        document.getElementById('telemetry-mtx').innerHTML = "LOST";
                        document.getElementById('node-alignment').innerHTML = "Searching Surface";
                        document.getElementById('node-alignment').style.color = "var(--accent-red)";
                        
                        if (!hasBeenPlacedOnce) {
                            hudText.innerHTML = "SLOWLY MOVE CAMERA";
                        }
                    }
                }
            }

            if (activeModelInstance && activeModelInstance.visible && !isHolding && startTouchDistance === 0 && hasBeenPlacedOnce) {
                activeModelInstance.rotation.y += 0.004;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
